name: GitHub Actions Build and Deploy Demo

on:
  push:
    branches:
      - master
      - copilot/organize-knowledge-base

env:
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore AI summary cache
        uses: actions/cache@v4
        with:
          path: .cache/ai-summaries
          key: ai-summaries-${{ runner.os }}-${{ hashFiles('docs/**/*.md') }}
          restore-keys: |
            ai-summaries-${{ runner.os }}-

      - name: Install and Build
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: https://api.deepseek.com
          AI_MODEL: deepseek-v4-pro
        run: |
          npm install
          node tools/generate-summaries.mjs || echo "AI 摘要生成跳过（未配置 AI_API_KEY）"
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.ACONGM_VUEPRESS }}
          branch: gh-pages
          folder: vuepress
          force: true
