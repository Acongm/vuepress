name: Build and deploy VuePress

on:
  push:
    branches:
      - master
      - copilot/organize-knowledge-base

env:
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restore AI v1 summary snapshot
        uses: actions/cache@v4
        with:
          path: .cache/ai-summaries-v1.json
          key: ai-summaries-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ai-summaries-v1-${{ runner.os }}-${{ github.ref_name }}-
            ai-summaries-v1-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Restore deployed AI v1 snapshot
        env:
          SUMMARIES_FALLBACK_URL: https://acongm.github.io/vuepress
        run: node tools/restore-summaries-v1.mjs

      - name: Analyze changed Markdown only
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: https://api.deepseek.com
          AI_MODEL: deepseek-v4-pro
        run: npm run build:ai:v1

      - name: Build VuePress
        run: |
          node tools/generate-module-index.mjs
          npm run build
          npm run smoke:ai

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.ACONGM_VUEPRESS }}
          branch: gh-pages
          folder: vuepress
          force: true
